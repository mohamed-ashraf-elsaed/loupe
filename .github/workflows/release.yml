name: Release

# Tag a version (vX.Y.Z) → this creates the GitHub Release from CHANGELOG.md.
# It enforces the project rule: a release must update the docs (the changelog).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Enforce the docs rule — CHANGELOG must have this version
        run: |
          if ! grep -q "## \[${{ steps.v.outputs.version }}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for ${{ steps.v.outputs.version }}. Update the docs before releasing (see RELEASING.md)."
            exit 1
          fi

      - name: Extract release notes for this version
        run: awk '/^## \[${{ steps.v.outputs.version }}\]/{f=1;next} /^## \[/{f=0} f' CHANGELOG.md > NOTES.md

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file NOTES.md

  # Publishes the tagged version to BOTH registries after the release is cut:
  #   • public npm      → @loupekit/*                 (needs the NPM_TOKEN repo secret)
  #   • GitHub Packages → @mohamed-ashraf-elsaed/*    (uses the built-in GITHUB_TOKEN)
  # Publishes in dependency order (shared → mcp → sdk).
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build

      - name: Write .npmrc for both registries
        run: |
          cat > .npmrc <<'EOF'
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          @mohamed-ashraf-elsaed:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${GH_TOKEN}
          EOF

      - name: Publish to public npm (@loupekit, latest)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish ./packages/shared --access public
          npm publish ./packages/mcp    --access public
          npm publish ./packages/sdk    --access public

      - name: Mirror to GitHub Packages (@mohamed-ashraf-elsaed, latest)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/set-version.mjs --name-scope @mohamed-ashraf-elsaed
          npm publish ./packages/shared
          npm publish ./packages/mcp
          npm publish ./packages/sdk
